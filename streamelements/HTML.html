<div id="card">
  <div id="art">
    <img id="cover" alt="" />
    <div id="vizwrap">
      <canvas id="viz"></canvas>
      <div id="totalBadge">0:00</div>
    </div>
  </div>

  <div id="panel">
    <div id="meta">
      <div id="logo"></div>
      <div id="metatext">
        <div id="track">Waiting for music…</div>
        <div id="artist"></div>
      </div>
    </div>

    <div id="progress">
      <span id="cur" class="t">0:00</span>
      <div id="bar"><div id="fill"></div><div id="knob"></div></div>
      <span id="dur" class="t">0:00</span>
    </div>

    <div id="playbtn">
      <svg id="iconPlay" viewBox="0 0 24 24" width="26" height="26"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
      <svg id="iconPause" viewBox="0 0 24 24" width="26" height="26" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z" fill="currentColor"/></svg>
    </div>
  </div>
</div>
