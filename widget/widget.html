<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spotify Now Playing</title>
    <style>
      :root {
        --bg: rgba(18, 18, 18, 0.85);
        --accent: #1db954;
        --text: #ffffff;
        --sub: #b3b3b3;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        background: transparent;
        font-family: "Montserrat", -apple-system, Segoe UI, Roboto, sans-serif;
        overflow: hidden;
      }
      #card {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 380px;
        padding: 12px;
        border-radius: 14px;
        background: var(--bg);
        backdrop-filter: blur(8px);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.4s ease, transform 0.4s ease;
      }
      #card.show { opacity: 1; transform: translateY(0); }

      #cover {
        width: 64px;
        height: 64px;
        border-radius: 8px;
        object-fit: cover;
        flex: 0 0 auto;
        background: #333;
      }
      #info { flex: 1 1 auto; min-width: 0; }
      #track {
        color: var(--text);
        font-size: 15px;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #artist {
        color: var(--sub);
        font-size: 12px;
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #bar {
        margin-top: 10px;
        height: 4px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.15);
        overflow: hidden;
      }
      #fill {
        height: 100%;
        width: 0%;
        background: var(--accent);
        transition: width 0.25s linear;
      }
      #times {
        display: flex;
        justify-content: space-between;
        color: var(--sub);
        font-size: 10px;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div id="card">
      <img id="cover" alt="" />
      <div id="info">
        <div id="track">Waiting for Spotify…</div>
        <div id="artist"></div>
        <div id="bar"><div id="fill"></div></div>
        <div id="times"><span id="pos">0:00</span><span id="dur">0:00</span></div>
      </div>
    </div>

    <!-- Configure these two values, then add this file as an OBS Browser Source. -->
    <script>
      window.WIDGET_CONFIG = {
        relayUrl: "wss://music.noblenestel.giize.com",
        channel: "your-unique-name",
      };
    </script>
    <script src="widget.js"></script>
  </body>
</html>
